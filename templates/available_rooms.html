<h2>Available Rooms</h2>

<table border="1">

<tr>

<th>Room</th>

<th>Block</th>

<th>Capacity</th>

<th>Occupied</th>

<th>Status</th>

<th></th>

</tr>

{% for room in rooms %}

<tr>

<td>{{room.room_number}}</td>

<td>{{room.block}}</td>

<td>{{room.capacity}}</td>

<td>{{room.occupied}}</td>

<td>{{room.status}}</td>

<td>

<a href="/request_room/{{room.id}}">

Request Shift

</a>

</td>

</tr>

{% endfor %}

</table>
