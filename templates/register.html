<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{

            margin:0;

            background:linear-gradient(135deg,#eef7ff,#f8fbff);

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .register-card{

            width:100%;
            max-width:520px;

            background:white;

            border-radius:24px;

            padding:40px;

            box-shadow:0 15px 40px rgba(13,110,253,.10);

        }

        .logo{

            width:80px;
            height:80px;

            margin:auto;

            background:#eaf2ff;

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:38px;

            margin-bottom:20px;

        }

        h2{

            text-align:center;

            font-weight:700;

            color:#2563eb;

            margin-bottom:30px;

        }

        .form-control,
        .form-select{

            height:52px;

            border-radius:12px;

        }

        .form-control:focus,
        .form-select:focus{

            border-color:#2563eb;

            box-shadow:0 0 0 .2rem rgba(37,99,235,.15);

        }

        .btn-register{

            height:52px;

            border-radius:12px;

            background:#2563eb;

            border:none;

            font-weight:600;

            font-size:17px;

        }

        .btn-register:hover{

            background:#1d4ed8;

        }

        a{

            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="register-card">

<div class="logo">

🏠

</div>

<h2>

Student Registration

</h2>

<form method="POST">

<div class="mb-3">

<input
type="text"
name="name"
class="form-control"
placeholder="👤 Full Name"
required>

</div>

<div class="mb-3">

<input
type="email"
name="email"
class="form-control"
placeholder="📧 Email Address"
required>

</div>

<div class="mb-3">

<input
type="text"
name="roll_no"
class="form-control"
placeholder="🆔 Roll Number"
required>

</div>

<div class="mb-3">

<select
name="hostel_block"
class="form-select"
required>

<option value="">🏢 Select Hostel Block</option>

<option>A Block</option>

<option>B Block</option>

<option>C Block</option>

<option>D Block</option>

</select>

<!-- Room Range Information -->
<small class="text-primary fw-semibold d-block mt-2">
🏠 A Block → 101–150 |
B Block → 201–250 |
C Block → 301–350 |
D Block → 401–450
</small>

</div>

<div class="mb-3">

<input
type="text"
name="room_no"
class="form-control"
placeholder="🚪 Preferred Room Number"
required>

<div class="mb-4">

<input
type="password"
name="password"
class="form-control"
placeholder="🔒 Password"
required>

</div>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-primary btn-register">

Create Account

</button>

</div>

</form>

<hr class="my-4">

<p class="text-center mb-0">

Already have an account?

<a href="{{ url_for('auth.login') }}">

<b>Login</b>

</a>

</p>

</div>

</body>

</html>
