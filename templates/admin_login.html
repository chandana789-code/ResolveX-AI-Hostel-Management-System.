<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{

            margin:0;

            background:linear-gradient(135deg,#eef7ff,#f8fbff);

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .login-card{

            width:100%;
            max-width:470px;

            background:white;

            border-radius:24px;

            padding:40px;

            box-shadow:0 15px 40px rgba(13,110,253,.10);

        }

        .logo{

            width:80px;

            height:80px;

            background:#eaf2ff;

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:36px;

            margin:auto;

            margin-bottom:20px;

        }

        h2{

            text-align:center;

            color:#2563eb;

            font-weight:700;

            margin-bottom:30px;

        }

        .form-control{

            height:52px;

            border-radius:12px;

        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:0 0 0 .2rem rgba(37,99,235,.15);

        }

        .btn-login{

            height:52px;

            border:none;

            border-radius:12px;

            font-weight:600;

            font-size:17px;

            background:#2563eb;

            transition:.3s;

        }

        .btn-login:hover{

            background:#1d4ed8;

            transform:translateY(-2px);

        }

        a{

            text-decoration:none;

            font-weight:600;

        }

        .divider{

            margin:25px 0;

        }

        .badge-admin{

            background:#eaf2ff;

            color:#2563eb;

            padding:8px 18px;

            border-radius:30px;

            display:inline-block;

            margin-bottom:15px;

            font-size:14px;

        }

    </style>

</head>

<body>

<div class="login-card">

<div class="text-center">

<div class="logo">

👨‍💼

</div>

<span class="badge-admin">

Administrator Portal

</span>

</div>

<h2>

Admin Login

</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">

Username

</label>

<input

type="text"

name="username"

class="form-control"

placeholder="Enter admin username"

required>

</div>

<div class="mb-4">

<label class="form-label">

Password

</label>

<input

type="password"

name="password"

class="form-control"

placeholder="Enter admin password"

required>

</div>

<div class="d-grid">

<button

type="submit"

class="btn btn-primary btn-login">

Login to Dashboard

</button>

</div>

</form>

<hr class="divider">

<p class="text-center text-muted mb-0">

Smart Hostel Complaint & Room Management System

</p>

</div>

</body>

</html>
